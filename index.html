<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />

    <link rel="icon" type="image/svg+xml" href="/favicon.svg" />
    <link rel="stylesheet" href="/style.css" />
    <title>web-game</title>
  </head>
  <body>
    <div id="root"></div>

    <div class="scoreboard">
      <div class="score-left">
        <div class="column">
          <span class="score-upper">you</span>
          <span class="score-lower" id="player-score">0</span>
        </div>
      </div>
      <div class="score-middle">
        <div class="column">
          <span class="score-upper">hard</span>
          <span class="score-lower">vs</span>
        </div>
      </div>
      <div class="score-right">
        <div class="column">
          <span class="score-upper">bot</span>
          <span class="score-lower" id="enemy-score">0</span>
        </div>
      </div>
    </div>

    <script type="module" src="/src/main.ts"></script>
  </body>
</html>
